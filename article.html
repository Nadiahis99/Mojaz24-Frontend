  <script>
    (function () {
      try {
        var theme = localStorage.getItem('mojaz24-theme') || 'light';
        var fontScale = parseFloat(localStorage.getItem('mojaz24-font') || '1');
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
        if (!Number.isNaN(fontScale)) {
          root.style.fontSize = (Math.max(0.85, Math.min(1.3, fontScale)) * 16) + 'px';
        }
      } catch (e) {}
    })();
  </script>
  <style>
    html[data-theme="dark"], html[data-theme="dark"] body {
      background-color: #0d1117;
      color: #e6edf3;
    }
    html[data-theme="light"], html[data-theme="light"] body {
      background-color: #f5f6fa;
      color: #1a1d2e;
    }
  </style>

  <style>
    /* ===== ARTICLE PAGE STYLES — FULL REWRITE ===== */

    /* Page wrapper: full width, no cramping */
    .article-page {
      width: 100%;
      max-width: 860px;
      margin: 32px auto 80px;
      padding: 0 20px;
      box-sizing: border-box;
    }
    @media (max-width: 768px) { .article-page { padding: 0 14px; margin-top: 20px; } }
    @media (max-width: 480px) { .article-page { padding: 0 10px; margin-top: 16px; } }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted, #6b7280);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 20px;
      padding: 8px 16px;
      border-radius: 40px;
      background: var(--bg-card, #fff);
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      transition: background 0.2s, transform 0.2s;
    }
    .back-btn:hover { background: var(--bg-muted); transform: translateX(3px); }

    /* Article card: NO overflow hidden — let content breathe */
    .article-card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,.08);
      border: 1px solid var(--border);
      width: 100%;
      box-sizing: border-box;
      overflow: visible;   /* CRITICAL: was hidden, which clipped content */
    }

    /* Hero image — full width, no overflow clip needed */
    .article-hero-wrap {
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      width: 100%;
    }
    .article-hero-img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }
    @media (max-width: 640px) { .article-hero-img { max-height: 230px; } }
    @media (max-width: 400px) { .article-hero-img { max-height: 190px; } }

    /* Article body: generous, adaptive padding */
    .article-body {
      padding: 36px 44px 44px;
      box-sizing: border-box;
      width: 100%;
      overflow: visible;
    }
    @media (max-width: 900px) { .article-body { padding: 28px 32px 36px; } }
    @media (max-width: 640px) { .article-body { padding: 22px 18px 28px; } }
    @media (max-width: 400px) { .article-body { padding: 16px 12px 22px; } }

    /* Category badge row */
    .article-top-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    /* Title — no text clipping, proper wrap */
    .article-title {
      font-size: clamp(1.35rem, 3vw, 2rem);
      font-weight: 900;
      color: var(--text-1);
      line-height: 1.6;
      margin-bottom: 20px;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    /* Meta bar */
    .article-meta-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 14px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      color: var(--text-3);
      font-size: 0.85rem;
    }
    .article-meta-bar .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .article-meta-bar svg { flex-shrink: 0; opacity: 0.7; }

    /* ── ARTICLE CONTENT ── */
    .article-content {
      color: var(--text-2);
      font-size: 1.08rem;
      line-height: 2.05;
      width: 100%;
      box-sizing: border-box;
      overflow: visible;           /* never clip text */
      word-break: break-word;      /* prevent Arabic overflow */
      overflow-wrap: anywhere;
    }
    .article-content p {
      margin: 0 0 22px;
      white-space: pre-wrap;       /* respect line breaks from textarea */
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .article-content p:last-of-type { margin-bottom: 0; }

    /* ── CONTENT IMAGES ── all show, none clipped */
    .article-content-image {
      display: block;
      width: 100%;
      height: auto;
      max-height: 500px;
      object-fit: cover;
      border-radius: 12px;
      margin: 28px 0;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      box-sizing: border-box;
    }
    @media (max-width: 640px) {
      .article-content-image { max-height: 240px; margin: 18px 0; border-radius: 8px; }
    }

    /* ── VIDEO EMBED ── */
    .article-video-wrap {
      position: relative;
      margin: 28px 0;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16/9;
      width: 100%;
    }
    .article-video-wrap iframe,
    .article-video-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── AUDIO ── */
    .article-audio-wrap {
      margin: 22px 0;
    }
    .article-audio-wrap audio {
      width: 100%;
      border-radius: 8px;
    }

    /* ── SHARE BAR ── */
    .article-share {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 36px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    .article-share > span {
      font-weight: 700;
      color: var(--text-1);
      font-size: 0.9rem;
      margin-left: 4px;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.15s;
      text-decoration: none;
      font-family: 'Cairo', sans-serif;
    }
    .share-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .share-copy      { background: var(--bg-muted, #f1f3f9); color: var(--text-1); border: 1px solid var(--border); }
    .share-facebook  { background: #1877f2; color: #fff; }
    .share-twitter   { background: #1da1f2; color: #fff; }
    .share-whatsapp  { background: #25d366; color: #fff; }
    @media (max-width: 480px) {
      .share-btn { padding: 7px 10px; font-size: .75rem; }
    }

    /* ── NOT FOUND ── */
    .article-not-found {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-3);
    }
    .article-not-found h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: var(--text-1);
    }

    /* ── RELATED NEWS ── */
    .related-section { margin-top: 40px; }
    .related-section h3 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .related-section h3::after {
      content: '';
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    @media (max-width: 480px) { .related-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }
    @media (max-width: 360px) { .related-grid { grid-template-columns: 1fr; } }

      line-height: 1.5;

      background-size: 200% 100%;

      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

  <script>
    // ===== ARTICLE PAGE LOGIC =====
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function createPlaceholder(label) {
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1d3557"/><stop offset="100%" stop-color="#457b9d"/>
          </linearGradient></defs>
          <rect width="1200" height="675" fill="url(#g)"/>
          <text x="600" y="345" font-family="Cairo, Arial" font-size="58" fill="#ffffff" text-anchor="middle">${label}</text>
        </svg>`
      )}`;
    }

    function formatDate(ts) {
      if (!ts) return 'الآن';
      return new Date(ts).toLocaleString('ar-EG', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    }

    function estimateReadTime(content) {
      const words = (content || '').trim().split(/\s+/).filter(Boolean).length;
      return `${Math.max(1, Math.ceil(words / 180))} دقيقة قراءة`;
    }

    function getTagClass(category) {
      const v = (category || '').trim();
      if (v === 'عاجل') return 'tag-urgent';
      if (v === 'سياسة') return 'tag-politics';
      if (v === 'اقتصاد') return 'tag-economy';
      if (v === 'عالمي') return 'tag-world';
      return 'tag-accent';
    }

    function getNewsId(news) {
      return news?._id || news?.id || '';
    }

    function getVideoEmbed(url) {
      if (!url) return '';
      // YouTube
      const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
      if (ytMatch) {
        return `<div class="article-video-wrap"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allowfullscreen></iframe></div>`;
      }
      // Generic video URL
      return `<div class="article-video-wrap"><video controls src="${escapeHtml(url)}"></video></div>`;
    }

    async function renderArticle() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const page = document.getElementById('articlePage');

      if (!id || !window.MojazNewsStore) {
        page.innerHTML = `<div class="article-not-found"><h2>لم يُعثر على الخبر</h2><p>الخبر غير موجود أو تم حذفه.</p><a href="index.html" class="back-btn" style="margin-top:20px;display:inline-flex;">← العودة للرئيسية</a></div>`;
        return;
      }

await window.MojazNewsStore.ready().catch(() => null);
const allNews = window.MojazNewsStore.getAll();
const news = allNews.find(n => String(getNewsId(n)) === String(id));

if (!news) {
  page.innerHTML = `<div class="article-not-found"><h2>لم يُعثر على الخبر</h2><p>الخبر غير موجود أو تم حذفه.</p><a href="index.html" class="back-btn" style="margin-top:20px;display:inline-flex;">← العودة للرئيسية</a></div>`;
  return;
}

      // Update page title
      document.title = `${news.title} | مُوجز 24`;

      // Build paragraphs
      const paragraphs = (news.content || '')
        .split(/\n{2,}|\r\n\r\n/)
        .map(p => p.trim()).filter(Boolean);

      // Video section — check all possible field names
      let videoHtml = '';
      if (news.videoFile) {
        videoHtml = `<div class="article-video-wrap"><video controls src="${escapeHtml(news.videoFile)}"></video></div>`;
      } else if (news.videoUrl || news.video) {
        videoHtml = getVideoEmbed(news.videoUrl || news.video);
      }

      // Audio section
      const audioHtml = news.audioFile
        ? `<div class="article-audio-wrap"><audio controls src="${escapeHtml(news.audioFile)}"></audio></div>`
        : '';

      // Support multiple content images (contentImages array) or single contentImage
      const contentImagesList = Array.isArray(news.contentImages) && news.contentImages.length
        ? news.contentImages
        : (news.contentImage ? [news.contentImage] : []);

      // Build content: paragraphs with images woven in, ALL images guaranteed to show
      function buildContentWithImages(paragraphs, images) {
        if (!images.length) {
          return paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join('');
        }
        const result = [];
        // Insert one image after every N paragraphs (even distribution)
        const total = paragraphs.length;
        const imgCount = images.length;
        // Spread insertion points across paragraphs
        const insertAfter = new Set();
        for (let i = 0; i < imgCount; i++) {
          // Spread evenly: after paragraph at position floor((i+1) * total / (imgCount+1)) - 1
          const pos = Math.min(total - 1, Math.floor((i + 1) * total / (imgCount + 1)));
          insertAfter.add(pos);
        }
        let imgIdx = 0;
        paragraphs.forEach((p, i) => {
          result.push(`<p>${escapeHtml(p)}</p>`);
          if (insertAfter.has(i) && imgIdx < images.length) {
            result.push(`<img src="${escapeHtml(images[imgIdx])}" alt="${escapeHtml(news.title)}" class="article-content-image" loading="lazy">`);
            imgIdx++;
          }
        });
        // Always append remaining images — none left behind
        while (imgIdx < images.length) {
          result.push(`<img src="${escapeHtml(images[imgIdx])}" alt="${escapeHtml(news.title)}" class="article-content-image" loading="lazy">`);
          imgIdx++;
        }
        return result.join('');
      }

      const contentHtml = buildContentWithImages(paragraphs, contentImagesList);

      // Related news (same category, exclude current)
      const related = allNews
        .filter(n => String(getNewsId(n)) !== String(id) && n.category === news.category)
        .slice(0, 3);

      const relatedHtml = related.length ? `
        <div class="related-section">
          <h3>أخبار ذات صلة</h3>
          <div class="related-grid">
            ${related.map(r => `
              <a class="related-card" href="article.html?id=${encodeURIComponent(getNewsId(r))}">
                <img src="${escapeHtml(r.imageUrl || r.image || r.contentImage || createPlaceholder('موجز 24'))}" alt="${escapeHtml(r.title)}" loading="lazy">
                <div class="related-card-body">
                  <span class="tag tag-sm ${getTagClass(r.category)}">${escapeHtml(r.category || 'خبر')}</span>
                  <h4>${escapeHtml(r.title)}</h4>
                </div>
              </a>
            `).join('')}
          </div>
        </div>` : '';

      // Share URL
      const shareUrl = encodeURIComponent(window.location.href);
      const shareTitle = encodeURIComponent(news.title);

      page.innerHTML = `
        <a href="javascript:history.back()" class="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          رجوع
        </a>

        <div class="article-card">
  ${(news.imageUrl || news.image) ? `
    <div class="article-hero-wrap">
      <img 
        src="${escapeHtml(news.imageUrl || news.image)}" 
        alt="${escapeHtml(news.title)}" 
        class="article-hero-img" 
        loading="lazy">
    </div>
  ` : ''}
  
  <div class="article-body">
    <div class="article-top-meta">
      <span class="tag ${getTagClass(news.category)}">
        ${escapeHtml(news.category || 'خبر')}
      </span>
    </div>
            <h1 class="article-title">${escapeHtml(news.title)}</h1>
            <div class="article-meta-bar">
              <span class="meta-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${escapeHtml(formatDate(news.createdAt))}
              </span>
              <span class="meta-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
                ${escapeHtml(estimateReadTime(news.content))}
              </span>
            </div>

            <div class="article-content">
              ${contentHtml}
              ${videoHtml}
              ${audioHtml}
            </div>

            <div class="article-share">
              <span>شارك الخبر:</span>
              <button class="share-btn share-copy" onclick="copyLink()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                نسخ الرابط
              </button>
              <a class="share-btn share-facebook" href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                فيسبوك
              </a>
              <a class="share-btn share-twitter" href="https://twitter.com/intent/tweet?text=${shareTitle}&url=${shareUrl}" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
                تويتر
              </a>
              <a class="share-btn share-whatsapp" href="https://wa.me/?text=${shareTitle}%20${shareUrl}" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                واتساب
              </a>
            </div>
          </div>
        </div>

        ${relatedHtml}
      `;
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const toast = document.getElementById('toast');
        if (toast) {
          toast.textContent = '✓ تم نسخ الرابط';
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2500);
        }
      });
    }

    // Search redirect
    document.addEventListener('DOMContentLoaded', () => {
      renderArticle().catch(() => {});

      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('keydown', e => {
          if (e.key === 'Enter' && searchInput.value.trim()) {
            window.location.href = `category.html?search=${encodeURIComponent(searchInput.value.trim())}`;
          }
        });
      }
    });
  </script>
</body>
</html>
